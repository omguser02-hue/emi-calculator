<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free Online EMI Calculator - Personal Loan, Home Loan, Car Loan ka monthly EMI aur total interest turant calculate karein.">
  <title>EMI Calculator - Free Loan EMI Calculator India</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #4e54c8, #8f94fb);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 680px;
      margin: 40px auto;
      background: white;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      text-align: center;
    }
    h1 { 
      color: #2c3e50; 
      font-size: 2.6rem;
      margin-bottom: 8px;
    }
    .tagline { color: #555; margin-bottom: 30px; font-size: 1.15rem; }
    label {
      display: block;
      text-align: left;
      margin: 18px 0 8px;
      font-weight: 600;
      color: #2c3e50;
    }
    input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 17px;
    }
    button {
      background: #27ae60;
      color: white;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      margin: 25px 0 15px;
      cursor: pointer;
      width: 100%;
      transition: 0.3s;
    }
    button:hover { background: #219653; transform: translateY(-2px); }
    .result {
      background: #e8f5e9;
      padding: 25px;
      border-radius: 15px;
      margin: 20px 0;
      font-size: 1.35rem;
      font-weight: bold;
      color: #27ae60;
      display: none;
      border: 3px solid #27ae60;
    }
    .offers {
      margin-top: 35px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
      font-size: 15.5px;
    }
    footer {
      text-align: center;
      margin-top: 60px;
      color: #ddd;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💰 EMI Calculator</h1>
    <p class="tagline">Personal Loan, Home Loan, Car Loan ka EMI turant jaano</p>

    <label>Loan Amount (₹)</label>
    <input type="number" id="amount" value="500000">

    <label>Interest Rate (% per annum)</label>
    <input type="number" id="rate" value="10.5" step="0.1">

    <label>Tenure (Months)</label>
    <input type="number" id="months" value="36">

    <button onclick="calculateEMI()">Calculate EMI</button>

    <div id="result" class="result"></div>

    <div class="offers">
      <strong>Best Loan Offers:</strong><br><br>
      <a href="https://www.paisabazaar.com/personal-loan/" target="_blank">→ Paisabazaar pe Loan Apply Karein</a><br><br>
      <a href="https://www.bankbazaar.com/personal-loan.html" target="_blank">→ BankBazaar pe Sabse Acchi Rate Dekhein</a>
    </div>
  </div>

  <footer>
    Made with ❤️ for Indians • Free Tool
  </footer>

  <script>
    function calculateEMI() {
      const amount = parseFloat(document.getElementById('amount').value);
      const rate = parseFloat(document.getElementById('rate').value) / 1200;
      const months = parseFloat(document.getElementById('months').value);

      if (!amount || !rate || !months) {
        alert("Sab fields bharein please!");
        return;
      }

      const emi = (amount * rate * Math.pow(1 + rate, months)) / (Math.pow(1 + rate, months) - 1);
      const totalPay = emi * months;
      const totalInterest = totalPay - amount;

      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = `
        Monthly EMI: <span style="color:#27ae60">₹${emi.toFixed(2)}</span><br><br>
        Total Amount: ₹${totalPay.toFixed(2)}<br>
        Total Interest: ₹${totalInterest.toFixed(2)}
      `;
    }
  </script>
</body>
</html>
